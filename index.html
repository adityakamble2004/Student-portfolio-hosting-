<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya Portfolio</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f0f0f;
            color: white;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-direction: column;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: bold;
        }

        .hero h2 {
            font-size: 2rem;
            margin-top: 10px;
            color: #a0a0ff;
        }

        .hero p {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #ccc;
        }

        .scroll-down {
            position: absolute;
            bottom: 20px;
            font-size: 14px;
            color: #aaa;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }
    </style>
</head>

<body>

    <section class="hero">
        <h1>Aditya</h1>
        <h2>Android & Web Developer</h2>
        <p>Building real-world solutions with code</p>

        <div class="scroll-down">↓ Scroll</div>
    </section>

</body>
</html>
